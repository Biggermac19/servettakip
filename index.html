<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Servet Takip</title>

  <style>
    :root{
      --bg: #14161c; /* senin verdiğin ana arka plan */
    }

    *{ box-sizing: border-box; }
    html, body{
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
    }

    /* Arka plandaki hafif “vignette/derinlik” hissi */
    body{
      background:
        radial-gradient(1200px 700px at 50% 45%, rgba(255,255,255,0.06), rgba(0,0,0,0) 55%),
        radial-gradient(1400px 900px at 50% 50%, rgba(0,0,0,0.35), rgba(0,0,0,0.75) 70%),
        var(--bg);
      display: grid;
      place-items: center;
    }

    /* 1440x900 sahne: tüm assetler aynı ölçüde üst üste oturacak */
    .stage{
      position: relative;
      width: min(100vw, calc(100vh * (1440 / 900)));
      height: min(100vh, calc(100vw * (900 / 1440)));
      aspect-ratio: 1440 / 900;
      user-select: none;
    }

    .layer{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none; /* tıklamaları engellemesin */
      image-rendering: auto;
    }

    /* İleride tıklanabilir yapmak istersen:
       .clickable { pointer-events:auto; cursor:pointer; } */
  </style>
</head>

<body>
  <div class="stage" aria-label="Servet Takip Ana Ekran">
    <!-- Sıralama önemli: alttan üste doğru -->

    <!-- Çerçeve/arka vurgular -->
    <img class="layer" src="assets/frame_big.png" alt="" />

    <!-- Üst logo + başlık -->
    <img class="layer" src="assets/header_logo_big.png" alt="Servet Takip" />

    <!-- Sol Menü -->
    <img class="layer" src="assets/menu_big.png" alt="Menü" />

    <!-- Sağ Hesabım -->
    <img class="layer" src="assets/account_big.png" alt="Hesabım" />

    <!-- Grafik butonları -->
    <img class="layer" src="assets/chart_change_big.png" alt="Grafik Değiştir" />
    <img class="layer" src="assets/chart_settings_big.png" alt="Grafik Ayarları" />

    <!-- Kategori yazıları (Borsa/Altın/Gayrimenkul) -->
    <img class="layer" src="assets/labels_text_big.png" alt="" />

    <!-- Pasta grafik -->
    <img class="layer" src="assets/pie_big.png" alt="Dağılım Grafiği" />

    <!-- Servet yazıları -->
    <img class="layer" src="assets/totals_big.png" alt="Servetim" />

    <!-- Varlık Ekle -->
    <img class="layer" src="assets/add_big.png" alt="Varlık Ekle" />
  </div>
</body>
</html>
