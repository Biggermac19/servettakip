<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Servet Takip</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg1:#15161b;
      --bg2:#121318;
      --text:#d9d9d9;
      --muted:#bdbdbd;
      --cardline:rgba(255,255,255,.45);
      --shadow:rgba(0,0,0,.55);

      --purple:#b79cff;
      --cyan:#8ed0ff;
      --gold:#f0d27c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 50% 0%, rgba(255,255,255,.06), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    /* === 1440x900 master layout === */
    .frame{
      width:1440px;
      height:900px;
      margin:0 auto;
      position:relative;
      overflow:hidden;
    }

    /* Top */
    .topbar{
      height:108px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 60px 0;
      gap:20px;
    }
    .top-left, .top-right{display:flex;align-items:flex-start;gap:14px;min-width:240px}
    .top-center{display:flex;align-items:center;gap:18px;justify-content:center;flex:1}

    .brand{
      display:flex;align-items:center;gap:16px;
      font-size:36px;font-weight:900; letter-spacing:.4px;
      color:#bfbfbf;
      text-shadow: 0 2px 12px rgba(0,0,0,.35);
      margin-top:6px;
    }

    .logo{
      width:86px;height:86px;border-radius:12px;
      background:#ffd400;
      display:grid;place-items:center;
      box-shadow:0 10px 22px rgba(0,0,0,.25);
      margin-top:0;
    }
    .logo .mark{
      position:relative;
      width:70px;height:70px;
      display:grid;place-items:center;
    }
    .logo .s{
      font-weight:1000;
      font-size:58px;
      color:#0c0c0c;
      line-height:1;
      transform: translateX(-2px); /* S biraz sola */
    }
    /* ₺ işaretini S ile "kaynaştır" */
    .logo .try{
      position:absolute;
      right:-2px;
      top:11px;
      font-size:18px;
      font-weight:1000;
      color:#0c0c0c;
      transform:rotate(-18deg);
      opacity:.95;
      letter-spacing:-1px;
    }

    .iconBtn{
      display:flex;flex-direction:column;align-items:center;gap:12px;
      color:var(--muted);
      user-select:none;
    }
    .iconBtn .label{font-weight:800;font-size:22px;letter-spacing:.2px}

    .icon{
      width:58px;height:58px;opacity:.9;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }
    .hamburger{
      width:74px;height:58px;
      display:flex;flex-direction:column;justify-content:center;gap:10px;
      opacity:.85;
      margin-top:6px;
    }
    .hamburger div{height:4px;border-radius:4px;background:#cfcfcf;width:72px}
    .hamburger div:nth-child(2){width:58px}

    /* Main card */
    .wrap{
      width:1440px;
      margin:0 auto;
      padding:0 60px;
    }
    .chartCard{
      position:relative;
      border:3px solid var(--cardline);
      border-radius:4px;
      padding:22px 22px 22px;
      height:380px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 40px var(--shadow);
      background: rgba(0,0,0,.08);
      overflow:hidden;
      margin-top:8px;
    }

    .cardCorner{
      position:absolute;
      right:18px;
      top:18px;
      bottom:18px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      color:var(--muted);
      font-weight:900;
      text-align:right;
      font-size:18px;
      opacity:.95;
    }
    .cornerItem{
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
    }
    .cornerIcon{
      width:46px;height:46px; opacity:.9;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.45));
    }

    .pieArea{
      width:620px; height:320px;
      position:relative;
      display:flex; align-items:center; justify-content:center;
      transform: translateY(6px);
    }

    /* Labels around pie (Canva'ya yakın) */
    .labelText{
      position:absolute;
      font-size:30px;
      font-weight:900;
      color:#bfbfbf;
      text-shadow: 0 10px 20px rgba(0,0,0,.35);
      letter-spacing:.3px;
    }
    .lbl-borsa{left:64px; top:76px}
    .lbl-altin{left:76px; top:214px}
    .lbl-gayrimenkul{right:-6px; top:130px}

    /* Totals */
    .totals{
      width:1440px;
      margin:26px auto 0;
      text-align:center;
      padding:0 60px;
    }
    .totals .big{
      font-size:46px;
      font-weight:1000;
      color:#cfcfcf;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
      letter-spacing:.6px;
    }
    .split{
      margin-top:28px;
      display:flex;
      justify-content:center;
      gap:90px;
      flex-wrap:wrap;
      color:#c7c7c7;
      font-weight:1000;
      font-size:34px;
      letter-spacing:.3px;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
    }

    /* Add button */
    .addWrap{
      width:1440px;
      margin:26px auto 0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding:0 60px;
    }
    .addBtn{
      width:170px;height:170px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #efefef, #cfcfcf 55%, #a9a9a9);
      box-shadow:
        inset 0 10px 18px rgba(255,255,255,.35),
        inset 0 -10px 18px rgba(0,0,0,.18),
        0 18px 34px rgba(0,0,0,.45);
      display:grid; place-items:center;
      cursor:pointer;
      border:none;
    }
    .plus{
      width:90px;height:90px;border-radius:18px;
      position:relative;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }
    .plus::before, .plus::after{
      content:"";
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      background:#e7e2d8;
      border-radius:10px;
      box-shadow: inset 0 6px 10px rgba(255,255,255,.35),
                  inset 0 -6px 10px rgba(0,0,0,.12);
    }
    .plus::before{width:100px;height:18px}
    .plus::after{width:18px;height:100px}

    .addLabel{
      font-size:30px;
      font-weight:1000;
      color:#bfbfbf;
      letter-spacing:.3px;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
    }

    /* If screen smaller than 1440, scale down to fit (still keeps positions) */
    @media (max-width: 1440px){
      .frame{
        transform: scale(calc(100vw / 1440));
        transform-origin: top left;
        width:1440px; height:900px;
      }
      body{overflow-x:hidden}
    }
    @media (max-width: 900px){
      .frame{transform: scale(calc(100vw / 1440));}
    }
  </style>
</head>
<body>

<div class="frame">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="top-left">
      <div class="iconBtn" style="align-items:flex-start">
        <div class="hamburger" aria-hidden="true">
          <div></div><div></div><div></div>
        </div>
        <div class="label">Menü</div>
      </div>
    </div>

    <div class="top-center">
      <div class="logo" title="Servet Takip">
        <div class="mark">
          <div class="s">S</div>
          <div class="try">₺</div>
        </div>
      </div>
      <div class="brand">Servet Takip</div>
    </div>

    <div class="top-right" style="justify-content:flex-end">
      <div class="iconBtn">
        <svg class="icon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.76 0 5-2.46 5-5.5S14.76 1 12 1 7 3.46 7 6.5 9.24 12 12 12Zm0 2c-4.42 0-8 2.24-8 5v3h16v-3c0-2.76-3.58-5-8-5Z"/>
        </svg>
        <div class="label">Hesabım</div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="chartCard">
      <div class="cardCorner">
        <div class="cornerItem">
          <div>Grafik<br/>Değiştir</div>
          <svg class="cornerIcon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 19h16v2H2V3h2v16Zm3-2V9h3v8H7Zm5 0V5h3v12h-3Zm5 0v-6h3v6h-3Z"/>
          </svg>
        </div>
        <div class="cornerItem">
          <div>Grafik<br/>Ayarları</div>
          <svg class="cornerIcon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.6 7.6 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.13.23.39.32.6.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.1.47.01.6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
          </svg>
        </div>
      </div>

      <div class="pieArea">
        <div class="labelText lbl-borsa">Borsa</div>
        <div class="labelText lbl-altin">Altın</div>
        <div class="labelText lbl-gayrimenkul">Gayrimenkul</div>

        <canvas id="pie" width="440" height="280" style="max-width:440px;max-height:280px;"></canvas>
      </div>
    </div>
  </div>

  <div class="totals">
    <div class="big">Servetim: <span id="totalVal">2.955.245,87₺</span></div>
    <div class="split">
      <div>Aktif Servetim: <span id="activeVal">2.000.000₺</span></div>
      <div>Pasif Servetim: <span id="passiveVal">955.245,87₺</span></div>
    </div>
  </div>

  <div class="addWrap">
    <button class="addBtn" onclick="alert('Varlık Ekle: bir sonraki adımda form/modal bağlayacağız.')">
      <div class="plus" aria-hidden="true"></div>
    </button>
    <div class="addLabel">Varlık Ekle</div>
  </div>
</div>

<script>
  const data = [35, 25, 40];
  const labels = ["Borsa", "Altın", "Gayrimenkul"];
  const ctx = document.getElementById("pie").getContext("2d");

  // Shadow + "raised" feel
  const shadowPlugin = {
    id: 'shadow',
    beforeDatasetsDraw(chart) {
      const {ctx} = chart;
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.55)';
      ctx.shadowBlur = 18;
      ctx.shadowOffsetX = 10;
      ctx.shadowOffsetY = 14;
    },
    afterDatasetsDraw(chart) { chart.ctx.restore(); }
  };

  new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: ["#b79cff", "#f0d27c", "#8ed0ff"],
        borderColor: "rgba(0,0,0,.45)",
        borderWidth: 2,
        hoverOffset: 8,
        spacing: 10,
        borderRadius: 12,
      }]
    },
    options: {
      responsive: false, // fixed for pixel-perfect 1440x900
      cutout: "36%",
      plugins: { legend: { display:false } }
    },
    plugins: [shadowPlugin]
  });
</script>

</body>
</html>
