<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Servet Takip</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: system-ui, sans-serif;
  background: linear-gradient(180deg,#14161C,#101217);
  color:#cfcfcf;
}

/* ===== MASTER CONTAINER ===== */
.container{
  max-width:1440px;
  margin:0 auto;
  padding:40px 80px;
}

/* ===== HEADER ===== */
.header{
  display:grid;
  grid-template-columns: 220px 1fr 220px;
  align-items:center;
  margin-bottom:40px;
}

.leftBlock, .rightBlock{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.hamburger{
  width:60px;
}
.hamburger div{
  height:4px;
  background:#cfcfcf;
  margin:10px 0;
  border-radius:4px;
}

.centerBrand{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
}

.logoBox{
  width:80px;
  height:80px;
  background:#FFD400;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
}

.logoMark{
  position:relative;
  font-weight:900;
  font-size:56px;
  color:black;
}

.logoMark span{
  position:absolute;
  font-size:18px;
  right:-8px;
  top:8px;
  transform:rotate(-18deg);
}

.brandText{
  font-size:36px;
  font-weight:800;
}

/* ===== CHART CARD ===== */
.chartCard{
  border:3px solid rgba(255,255,255,.6);
  padding:30px;
  position:relative;
  height:360px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.chartRight{
  position:absolute;
  right:30px;
  top:30px;
  bottom:30px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  font-weight:700;
}

.chartArea{
  width:420px;
  height:420px;
  position:relative;
}

.label{
  position:absolute;
  font-weight:800;
  font-size:28px;
}

.borsa{ left:-140px; top:90px; }
.altin{ left:-130px; bottom:80px; }
.gayrimenkul{ right:-160px; top:160px; }

/* ===== TOTALS ===== */
.total{
  text-align:center;
  margin-top:40px;
  font-size:44px;
  font-weight:900;
}

.split{
  display:flex;
  justify-content:center;
  gap:80px;
  margin-top:30px;
  font-size:32px;
  font-weight:800;
}

/* ===== ADD BUTTON ===== */
.addSection{
  text-align:center;
  margin-top:40px;
}

.addBtn{
  width:160px;
  height:160px;
  border-radius:50%;
  background: radial-gradient(circle,#eee,#bbb);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.plus{
  width:90px;
  height:90px;
  position:relative;
}

.plus:before,
.plus:after{
  content:"";
  position:absolute;
  background:#e7e2d8;
  border-radius:8px;
}

.plus:before{
  width:100%;
  height:16px;
  top:50%;
  transform:translateY(-50%);
}

.plus:after{
  height:100%;
  width:16px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="leftBlock">
      <div class="hamburger">
        <div></div><div></div><div></div>
      </div>
      <div>Menü</div>
    </div>

    <div class="centerBrand">
      <div class="logoBox">
        <div class="logoMark">
          S<span>₺</span>
        </div>
      </div>
      <div class="brandText">Servet Takip</div>
    </div>

    <div class="rightBlock">
      <svg width="60" height="60" fill="#cfcfcf" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5Zm0 2c-4.4 0-8 2.2-8 5v3h16v-3c0-2.8-3.6-5-8-5Z"/>
      </svg>
      <div>Hesabım</div>
    </div>

  </div>

  <!-- CHART -->
  <div class="chartCard">
    <div class="chartArea">
      <div class="label borsa">Borsa</div>
      <div class="label altin">Altın</div>
      <div class="label gayrimenkul">Gayrimenkul</div>
      <canvas id="pie"></canvas>
    </div>

    <div class="chartRight">
      <div>Grafik<br>Değiştir</div>
      <div>Grafik<br>Ayarları</div>
    </div>
  </div>

  <!-- TOTAL -->
  <div class="total">
    Servetim: 2.955.245,87₺
  </div>

  <div class="split">
    <div>Aktif Servetim: 2.000.000₺</div>
    <div>Pasif Servetim: 955.245,87₺</div>
  </div>

  <!-- ADD -->
  <div class="addSection">
    <div class="addBtn">
      <div class="plus"></div>
    </div>
    <div style="margin-top:15px;font-size:28px;font-weight:800;">Varlık Ekle</div>
  </div>

</div>

<script>
new Chart(document.getElementById("pie"),{
  type:"doughnut",
  data:{
    labels:["Borsa","Altın","Gayrimenkul"],
    datasets:[{
      data:[35,25,40],
      backgroundColor:["#b79cff","#f0d27c","#8ed0ff"],
      borderWidth:6,
      borderColor:"#14161C"
    }]
  },
  options:{
    cutout:"35%",
    plugins:{legend:{display:false}}
  }
});
</script>

</body>
</html>
