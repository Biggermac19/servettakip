<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1, maximum-scale=1" />
  <title>Servet Takip</title>
  <style>
    :root{
      --bg:#14161c;
      --w:1440px;
      --h:900px;
    }
    html, body { height:100%; margin:0; background:var(--bg); }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:auto;
    }
    .stage{
      position:relative;
      width:var(--w);
      height:var(--h);
      background:var(--bg);
      overflow:hidden;
    }
    .layer{
      position:absolute;
      inset:0;
      width:var(--w);
      height:var(--h);
      display:block;
      pointer-events:none;
      image-rendering:auto;
      -webkit-user-drag:none;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="stage" aria-label="Servet Takip Ana Ekran">
    <img class="layer" src="assets/frame_big.png" alt="" style="z-index:10">

    <img class="layer" src="assets/pie_big.png" alt="" style="z-index:20">
    <img class="layer" src="assets/labels_text_big.png" alt="" style="z-index:30">

    <img class="layer" src="assets/chart_change_big.png" alt="" style="z-index:40">
    <img class="layer" src="assets/chart_settings_big.png" alt="" style="z-index:41">

    <img class="layer" src="assets/totals_big.png" alt="" style="z-index:50">
    <img class="layer" src="assets/add_big.png" alt="" style="z-index:60">

    <img class="layer" src="assets/menu_big.png" alt="" style="z-index:70">
    <img class="layer" src="assets/account_big.png" alt="" style="z-index:71">

    <img class="layer" src="assets/header_logo_big.png" alt="Servet Takip" style="z-index:80">
  </div>
</body>
</html>
