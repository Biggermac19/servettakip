<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Servet Takip</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0b0c10;overflow:hidden;font-family:Arial,Helvetica,sans-serif}

/* SAHNE HER ZAMAN ORTADA */
#wrap{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
}

/* 1440x900 REFERANS SAHNE */
#stage{
  width:1440px;
  height:900px;
  position:relative;
  transform-origin:center center;
}

/* ARKA PLAN */
.bg{
  position:absolute;
  inset:0;
  background:#14161c;
}

/* TÜM PNG LAYERLAR */
.layer{
  position:absolute;
  left:0;
  top:0;
  width:1440px;
  height:900px;
  pointer-events:none;
}

/* TEXT */
.txt{
  position:absolute;
  color:rgba(220,220,220,0.95);
  font-weight:800;
  text-shadow:0 6px 14px rgba(0,0,0,0.6);
  user-select:none;
}

.pct{
  font-size:44px;
  color:#111;
  text-shadow:0 4px 8px rgba(0,0,0,0.4);
}

.big{font-size:52px;}
.mid{font-size:38px;}

/* YÜZDE KONUM (GEREKİRSE 1-2px OYNARIZ) */
#pctBorsa{left:620px;top:240px;}
#pctAltin{left:580px;top:390px;}
#pctGayri{left:740px;top:315px;}

/* SERVET SATIRLARI */
#total{left:400px;top:500px;}
#active{left:130px;top:640px;}
#passive{left:750px;top:640px;}

/* PANEL */
#panel{
  position:absolute;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(0,0,0,0.5);
}

#panel.open{display:grid;}

.card{
  width:480px;
  background:#1c1f27;
  border-radius:16px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  color:#eee;
}

.card h2{margin-bottom:12px;}

.card input{
  width:100%;
  margin:8px 0 14px;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

.card button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.apply{background:#2d7dff;color:#fff;}
.close{background:#444;color:#fff;margin-left:8px;}
</style>
</head>

<body>

<div id="wrap">
  <div id="stage">

    <div class="bg"></div>

    <!-- PNG LAYERLAR (FULL CANVAS) -->
    <img class="layer" src="./assets/Servet Takip (22).png">
    <img class="layer" src="./assets/Servet Takip (20).png">
    <img class="layer" src="./assets/Servet Takip (21).png">
    <img class="layer" src="./assets/Servet Takip (15).png">
    <img class="layer" src="./assets/Servet Takip (18).png">
    <img class="layer" src="./assets/Servet Takip (19).png">
    <img class="layer" src="./assets/Servet Takip (16).png">
    <img class="layer" src="./assets/Servet Takip (17).png">
    <img class="layer" src="./assets/Servet Takip (13).png">

    <!-- DİNAMİK YÜZDELER -->
    <div class="txt pct" id="pctBorsa">%35</div>
    <div class="txt pct" id="pctAltin">%25</div>
    <div class="txt pct" id="pctGayri">%40</div>

    <!-- DİNAMİK SERVET -->
    <div class="txt big" id="total">Servetim: 2.955.245₺</div>
    <div class="txt mid" id="active">Aktif Servetim: 2.000.000₺</div>
    <div class="txt mid" id="passive">Pasif Servetim: 955.245₺</div>

    <!-- PANEL (E tuşuna basınca açılır) -->
    <div id="panel">
      <div class="card">
        <h2>Değerleri Gir</h2>

        <label>Gayrimenkul (TL)</label>
        <input id="inGayri" type="number">

        <label>Borsa (TL)</label>
        <input id="inBorsa" type="number">

        <label>Altın (TL)</label>
        <input id="inAltin" type="number">

        <button class="apply" onclick="apply()">Uygula</button>
        <button class="close" onclick="closePanel()">Kapat</button>
      </div>
    </div>

  </div>
</div>

<script>
const stage = document.getElementById("stage");

/* ORAN BOZMADAN ORTALAMA */
function fit(){
  const s = Math.min(window.innerWidth/1440, window.innerHeight/900);
  stage.style.transform = "scale(" + s + ")";
}
window.addEventListener("resize", fit);
fit();

/* PANEL AÇMA */
document.addEventListener("keydown", e=>{
  if(e.key==="e") document.getElementById("panel").classList.add("open");
});

function closePanel(){
  document.getElementById("panel").classList.remove("open");
}

/* FORMAT */
function tl(x){
  return new Intl.NumberFormat("tr-TR").format(x)+"₺";
}
function pct(x){return "%"+Math.round(x);}

function apply(){
  const g = parseFloat(document.getElementById("inGayri").value)||0;
  const b = parseFloat(document.getElementById("inBorsa").value)||0;
  const a = parseFloat(document.getElementById("inAltin").value)||0;

  const total = g+b+a;

  document.getElementById("total").innerText = "Servetim: "+tl(total);
  document.getElementById("active").innerText = "Aktif Servetim: "+tl(b+a);
  document.getElementById("passive").innerText = "Pasif Servetim: "+tl(g);

  document.getElementById("pctBorsa").innerText = pct(total?b/total*100:0);
  document.getElementById("pctAltin").innerText = pct(total?a/total*100:0);
  document.getElementById("pctGayri").innerText = pct(total?g/total*100:0);

  closePanel();
}
</script>

</body>
</html>
