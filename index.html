<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Servet Takip</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg1:#15161b;
      --bg2:#121318;
      --text:#d9d9d9;
      --muted:#bdbdbd;
      --line:rgba(255,255,255,.35);
      --cardline:rgba(255,255,255,.45);
      --shadow:rgba(0,0,0,.55);

      --purple:#b79cff;
      --cyan:#8ed0ff;
      --gold:#f0d27c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 50% 0%, rgba(255,255,255,.06), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    /* Top */
    .topbar{
      height:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 46px;
      gap:20px;
    }
    .top-left, .top-right{display:flex;align-items:center;gap:14px;min-width:220px}
    .top-center{display:flex;align-items:center;gap:16px;justify-content:center;flex:1}
    .brand{
      display:flex;align-items:center;gap:16px;
      font-size:34px;font-weight:800; letter-spacing:.4px;
      color:#bfbfbf;
      text-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    .logo{
      width:80px;height:80px;border-radius:12px;
      background:#ffd400;
      display:grid;place-items:center;
      box-shadow:0 10px 22px rgba(0,0,0,.25);
    }
    .logo span{
      font-weight:900;
      font-size:54px;
      color:#0c0c0c;
      position:relative;
      line-height:1;
    }
    .logo span::after{
      content:"₺";
      position:absolute;
      font-size:18px;
      right:-10px; top:8px;
      transform:rotate(-20deg);
      opacity:.9;
    }

    .iconBtn{
      display:flex;flex-direction:column;align-items:center;gap:10px;
      color:var(--muted);
      user-select:none;
    }
    .iconBtn .label{font-weight:700;font-size:22px;letter-spacing:.2px}
    .icon{
      width:56px;height:56px;opacity:.9;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }
    .hamburger{
      width:70px;height:56px;
      display:flex;flex-direction:column;justify-content:center;gap:10px;
      opacity:.85;
    }
    .hamburger div{height:4px;border-radius:4px;background:#cfcfcf;width:68px}
    .hamburger div:nth-child(2){width:56px}

    /* Main card */
    .wrap{max-width:1120px;margin:18px auto 0; padding:0 18px}
    .chartCard{
      position:relative;
      border:3px solid var(--cardline);
      border-radius:4px;
      padding:18px 18px 22px;
      height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 40px var(--shadow);
      background: rgba(0,0,0,.08);
      overflow:hidden;
    }
    .cardCorner{
      position:absolute; right:16px;
      display:flex; flex-direction:column; gap:22px;
      color:var(--muted);
      font-weight:800;
      text-align:right;
      font-size:18px;
      opacity:.95;
    }
    .cornerItem{
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
    }
    .cornerIcon{
      width:46px;height:46px; opacity:.9;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.45));
    }

    .pieArea{
      width:560px; height:300px;
      position:relative;
      display:flex; align-items:center; justify-content:center;
    }
    /* Labels around pie */
    .labelText{
      position:absolute;
      font-size:30px;
      font-weight:800;
      color:#bfbfbf;
      text-shadow: 0 10px 20px rgba(0,0,0,.35);
      letter-spacing:.3px;
    }
    .lbl-borsa{left:22px; top:70px}
    .lbl-altin{left:34px; top:195px}
    .lbl-gayrimenkul{right:-40px; top:125px}

    /* Totals */
    .totals{
      margin:28px auto 0;
      text-align:center;
    }
    .totals .big{
      font-size:44px;
      font-weight:900;
      color:#cfcfcf;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
      letter-spacing:.6px;
    }
    .split{
      margin-top:28px;
      display:flex;
      justify-content:center;
      gap:90px;
      flex-wrap:wrap;
      color:#c7c7c7;
      font-weight:900;
      font-size:34px;
      letter-spacing:.3px;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
    }

    /* Add button */
    .addWrap{
      margin:32px auto 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }
    .addBtn{
      width:160px;height:160px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #efefef, #cfcfcf 55%, #a9a9a9);
      box-shadow:
        inset 0 10px 18px rgba(255,255,255,.35),
        inset 0 -10px 18px rgba(0,0,0,.18),
        0 18px 34px rgba(0,0,0,.45);
      display:grid; place-items:center;
      cursor:pointer;
      border:none;
    }
    .plus{
      width:86px;height:86px;border-radius:18px;
      position:relative;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }
    .plus::before, .plus::after{
      content:"";
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      background:#e7e2d8;
      border-radius:10px;
      box-shadow: inset 0 6px 10px rgba(255,255,255,.35),
                  inset 0 -6px 10px rgba(0,0,0,.12);
    }
    .plus::before{width:96px;height:18px}
    .plus::after{width:18px;height:96px}

    .addLabel{
      font-size:30px;
      font-weight:900;
      color:#bfbfbf;
      letter-spacing:.3px;
      text-shadow:0 14px 30px rgba(0,0,0,.35);
    }

    /* Responsive */
    @media (max-width: 980px){
      .topbar{padding:0 18px}
      .top-left,.top-right{min-width:auto}
      .brand{font-size:26px}
      .logo{width:64px;height:64px}
      .logo span{font-size:44px}
      .iconBtn .label{font-size:18px}
      .wrap{margin-top:10px}
      .chartCard{height:auto; padding:16px}
      .pieArea{width:100%; height:320px}
      .lbl-gayrimenkul{right:0}
      .split{font-size:26px; gap:28px}
      .totals .big{font-size:34px}
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="top-left">
      <div class="iconBtn" style="align-items:flex-start">
        <div class="hamburger" aria-hidden="true">
          <div></div><div></div><div></div>
        </div>
        <div class="label">Menü</div>
      </div>
    </div>

    <div class="top-center">
      <div class="logo" title="Servet Takip">
        <span>S</span>
      </div>
      <div class="brand">Servet Takip</div>
    </div>

    <div class="top-right" style="justify-content:flex-end">
      <div class="iconBtn">
        <!-- user icon -->
        <svg class="icon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.76 0 5-2.46 5-5.5S14.76 1 12 1 7 3.46 7 6.5 9.24 12 12 12Zm0 2c-4.42 0-8 2.24-8 5v3h16v-3c0-2.76-3.58-5-8-5Z"/>
        </svg>
        <div class="label">Hesabım</div>
      </div>
    </div>
  </div>

  <!-- CENTER CONTENT -->
  <div class="wrap">
    <div class="chartCard">
      <div class="cardCorner">
        <div class="cornerItem">
          <div>Grafik<br/>Değiştir</div>
          <!-- mini chart icon -->
          <svg class="cornerIcon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 19h16v2H2V3h2v16Zm3-2V9h3v8H7Zm5 0V5h3v12h-3Zm5 0v-6h3v6h-3Z"/>
          </svg>
        </div>
        <div class="cornerItem">
          <div>Grafik<br/>Ayarları</div>
          <!-- gear icon -->
          <svg class="cornerIcon" viewBox="0 0 24 24" fill="#cfcfcf" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.6 7.6 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.13.23.39.32.6.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.1.47.01.6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
          </svg>
        </div>
      </div>

      <div class="pieArea">
        <div class="labelText lbl-borsa">Borsa</div>
        <div class="labelText lbl-altin">Altın</div>
        <div class="labelText lbl-gayrimenkul">Gayrimenkul</div>

        <canvas id="pie" width="420" height="260" style="max-width:420px;max-height:260px;"></canvas>
      </div>
    </div>

    <div class="totals">
      <div class="big">Servetim: <span id="totalVal">2.955.245,87₺</span></div>

      <div class="split">
        <div>Aktif Servetim: <span id="activeVal">2.000.000₺</span></div>
        <div>Pasif Servetim: <span id="passiveVal">955.245,87₺</span></div>
      </div>
    </div>

    <div class="addWrap">
      <button class="addBtn" onclick="alert('Varlık Ekle: bir sonraki adımda form/modal bağlayacağız.')">
        <div class="plus" aria-hidden="true"></div>
      </button>
      <div class="addLabel">Varlık Ekle</div>
    </div>
  </div>

<script>
  // Canva'daki örnek oranlar
  const data = [35, 25, 40]; // Borsa, Altın, Gayrimenkul
  const labels = ["Borsa", "Altın", "Gayrimenkul"];

  const ctx = document.getElementById("pie").getContext("2d");

  // Hafif "3D" hissi için gölge plugin
  const shadowPlugin = {
    id: 'shadow',
    beforeDatasetsDraw(chart) {
      const {ctx} = chart;
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.55)';
      ctx.shadowBlur = 18;
      ctx.shadowOffsetX = 10;
      ctx.shadowOffsetY = 14;
    },
    afterDatasetsDraw(chart) {
      chart.ctx.restore();
    }
  };

  new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: ["#b79cff", "#f0d27c", "#8ed0ff"],
        borderColor: "rgba(0,0,0,.45)",
        borderWidth: 2,
        hoverOffset: 8,
        spacing: 8,        // dilimler arası boşluk
        borderRadius: 10,  // dilim köşeleri
      }]
    },
    options: {
      responsive: true,
      cutout: "35%",
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: (c) => `${c.label}: %${c.raw}` }
        }
      }
    },
    plugins: [shadowPlugin]
  });

  // Not: Yüzde yazılarını dilim içine yazdırmayı da ekleyebiliriz (bir sonraki adım).
</script>

</body>
</html>
