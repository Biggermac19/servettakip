<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Servet Takip</title>

  <!-- Baloo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#14161c;
      --text:#bfbfbf;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: var(--bg);
      font-family:"Baloo 2", system-ui, sans-serif;
      overflow:hidden; /* cover scale ile taşan kısımları kırp */
    }

    /* Ekranı dolduran sahne (cover) */
    .viewport{
      width:100vw;
      height:100vh;
      position:relative;
      overflow:hidden;
      background: radial-gradient(1200px 600px at 50% 0%, rgba(255,255,255,.05), transparent 60%), var(--bg);
    }

    /* 1440x900 tasarım alanı */
    .stage{
      width:1440px;
      height:900px;
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%,-50%) scale(1);
      transform-origin:center center;
    }

    /* Hepsi absolute yerleşecek */
    .abs{position:absolute; display:block}

    /* Header parçaları */
    .menu{ left:120px; top:125px; width:380px; }
    .account{ right:120px; top:120px; width:379px; }

    .brandWrap{
      position:absolute;
      left:50%;
      top:40px;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:18px;
    }
    .brandWrap img{
      width:90px;
      height:90px;
      border-radius:10px;
      box-shadow:0 14px 30px rgba(0,0,0,.35);
    }
    .brandText{
      font-size:44px;
      font-weight:800;
      color:var(--text);
      opacity:.95;
      text-shadow:0 12px 24px rgba(0,0,0,.35);
      letter-spacing:.2px;
    }

    /* Grafik kartı */
    .frame{ left:200px; top:170px; width:1040px; } /* frame.png kırpılmış hali: 1040x480 */
    .pie{ left:489px; top:235px; width:462px; }   /* pie.png kırpılmış hali */
    .labels{ left:193px; top:255px; width:1054px; } /* labels_percents.png */

    /* Sağ üst/alt kontroller */
    .chartChange{ left:1000px; top:190px; width:300px; }    /* kırpılmış görsel büyük; burada küçültüyoruz */
    .chartSettings{ left:985px; top:440px; width:330px; }

    /* Toplam yazıları */
    .totals{
      position:absolute;
      left:50%;
      top:650px;
      transform:translateX(-50%);
      width:1440px;
      text-align:center;
      color:var(--text);
      text-shadow:0 16px 30px rgba(0,0,0,.35);
    }
    .totals .big{
      font-size:54px;
      font-weight:800;
      opacity:.95;
    }
    .totals .row{
      margin-top:26px;
      display:flex;
      justify-content:center;
      gap:90px;
      font-size:40px;
      font-weight:800;
      opacity:.95;
    }

    /* Varlık ekle */
    .add{ left:455px; top:720px; width:530px; } /* add.png kırpılmış hali: 531x629; sahnede uygun küçültüyoruz */
  </style>
</head>

<body>
  <div class="viewport" id="viewport">
    <div class="stage" id="stage">

      <!-- Header -->
      <img class="abs menu" src="assets/menu.png" alt="Menü">
      <img class="abs account" src="assets/account.png" alt="Hesabım">

      <div class="brandWrap">
        <img src="assets/logo.png" alt="Servet Takip">
        <div class="brandText">Servet Takip</div>
      </div>

      <!-- Chart frame -->
      <img class="abs frame" src="assets/frame.png" alt="">
      <img class="abs pie" src="assets/pie.png" alt="">
      <img class="abs labels" src="assets/labels_percents.png" alt="">

      <img class="abs chartChange" src="assets/chart_change.png" alt="">
      <img class="abs chartSettings" src="assets/chart_settings.png" alt="">

      <!-- Totals -->
      <div class="totals">
        <div class="big">Servetim: 2.955.245,87₺</div>
        <div class="row">
          <div>Aktif Servetim: 2.000.000₺</div>
          <div>Pasif Servetim: 955.245,87₺</div>
        </div>
      </div>

      <!-- Add -->
      <img class="abs add" src="assets/add.png" alt="Varlık Ekle">

    </div>
  </div>

  <script>
    // 1440x900 tasarımı ekrana "cover" şekilde ölçekle (boşluk bırakmaz)
    const BASE_W = 1440, BASE_H = 900;
    const stage = document.getElementById("stage");

    function resize(){
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scale = Math.max(vw / BASE_W, vh / BASE_H); // COVER
      stage.style.transform = `translate(-50%,-50%) scale(${scale})`;
    }
    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
