<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Servet Takip (MVP)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Sahne: her şeyin referansı -->
  <div id="stageWrap">
    <div id="stage" aria-label="Servet Takip Sahnesi">

      <!-- ARKA PLAN (istersen kapatabilirsin; senin arka plan PNG'n varsa onu da layer yap) -->
      <div class="bg"></div>

      <!-- ÜST LOGO -->
      <img class="layer" id="hdrLogo" src="./assets/Servet%20Takip%20(22).png" alt="Servet Takip Logo" />

      <!-- SOL MENU -->
      <img class="layer" id="leftMenu" src="./assets/Servet%20Takip%20(20).png" alt="Menü" />

      <!-- SAĞ HESABIM -->
      <img class="layer" id="rightAccount" src="./assets/Servet%20Takip%20(21).png" alt="Hesabım" />

      <!-- ORTA KUTU ÇERÇEVE -->
      <img class="layer" id="frame" src="./assets/Servet%20Takip%20(15).png" alt="Çerçeve" />

      <!-- GRAFIK BUTONLAR -->
      <button class="hit" id="btnChartChange" type="button" aria-label="Grafik Değiştir">
        <img src="./assets/Servet%20Takip%20(17).png" alt="">
      </button>

      <button class="hit" id="btnChartSettings" type="button" aria-label="Grafik Ayarları">
        <img src="./assets/Servet%20Takip%20(16).png" alt="">
      </button>

      <!-- ORTA: LABEL'lar (Borsa/Altın/Gayrimenkul) -->
      <img class="layer" id="labels" src="./assets/Servet%20Takip%20(18).png" alt="Etiketler" />

      <!-- ORTA: PIE -->
      <img class="layer" id="pie" src="./assets/Servet%20Takip%20(19).png" alt="Dağılım Grafiği" />

      <!-- ORTA: YÜZDELER (DİNAMİK TEXT) -->
      <div class="txt pct" id="pctBorsa">%35</div>
      <div class="txt pct" id="pctAltin">%25</div>
      <div class="txt pct" id="pctGayri">%40</div>

      <!-- ORTA: TOPLAM / AKTIF / PASIF (DİNAMİK TEXT) -->
      <div class="txt big" id="totalWealth">Servetim: 2.955.245,87₺</div>
      <div class="txt mid left"  id="activeWealth">Aktif Servetim: 2.000.000₺</div>
      <div class="txt mid right" id="passiveWealth">Pasif Servetim: 955.245,87₺</div>

      <!-- ALT: VARLIK EKLE -->
      <button class="hit" id="btnAddAsset" type="button" aria-label="Varlık Ekle">
        <img src="./assets/Servet%20Takip%20(13).png" alt="">
      </button>

      <!-- ORTA SATIR (Servetim + alt satır) ayrı layer kullanmak istersen: -->
      <img class="layer" id="bottomTextLayer" src="./assets/Servet%20Takip%20(14).png" alt="" />

      <!-- AYAR PANELİ (basit) -->
      <div id="panel" role="dialog" aria-modal="true" aria-label="Değerleri Düzenle">
        <div class="panelCard">
          <div class="panelTitle">Değerleri Gir (TL)</div>

          <label>Gayrimenkul (TL)
            <input id="inGayri" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 1500000" />
          </label>

          <label>Borsa (TL)
            <input id="inBorsa" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 1000000" />
          </label>

          <label>Altın (TL)
            <input id="inAltin" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 500000" />
          </label>

          <label>Aktif / Pasif ayrımı (opsiyonel)
            <div class="row2">
              <input id="inActive" type="number" inputmode="decimal" step="0.01" placeholder="Aktif TL" />
              <input id="inPassive" type="number" inputmode="decimal" step="0.01" placeholder="Pasif TL" />
            </div>
            <small>Boş bırakırsan toplam = (Borsa+Altın+Gayrimenkul) üzerinden hesaplar.</small>
          </label>

          <div class="panelBtns">
            <button id="btnApply" type="button">Uygula</button>
            <button id="btnClose" type="button" class="ghost">Kapat</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
